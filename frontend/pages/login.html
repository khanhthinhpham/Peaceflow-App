<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập — PeaceFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Patrick+Hand&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../public/css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--cream) 0%, var(--mint-light) 100%);
            padding: 20px;
        }
        .auth-card {
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            text-align: center;
            background: var(--warm-white);
        }
        .auth-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            background: var(--mint);
            border-radius: var(--radius-sm);
            border: 2px solid var(--mint-dark);
            font-size: 1.8rem;
            box-shadow: 3px 3px 0px var(--mint-dark);
            margin-bottom: 20px;
        }
        .auth-title {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }
        .auth-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 24px;
        }
        .auth-form {
            text-align: left;
        }
        .auth-links {
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .auth-links a {
            color: var(--mint-dark);
            font-weight: 700;
        }
        #loginError {
            display: none;
            color: var(--coral-dark);
            background: var(--coral-light);
            padding: 10px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            margin-bottom: 15px;
            border: 1px solid var(--coral);
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: var(--text-light);
            font-size: 0.85rem;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px dashed var(--kraft-light);
        }
        .divider:not(:empty)::before {
            margin-right: .5em;
        }
        .divider:not(:empty)::after {
            margin-left: .5em;
        }
        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 10px 12px;
            border: 2px solid var(--kraft-light);
            border-radius: 50px;
            background: white;
            color: var(--text-primary);
            font-family: 'Nunito', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-google:hover {
            background: var(--cream);
            border-color: var(--kraft);
        }
    </style>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌿</text></svg>">
</head>
<body>

    <div class="auth-container">
        <div class="paper-card auth-card">
            <div class="auth-logo">🌿</div>
            <h1 class="auth-title">Chào mừng trở lại</h1>
            <p class="auth-subtitle">Tiếp tục hành trình tìm kiếm sự bình yên của bạn.</p>

            <div id="loginError"></div>

            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="Nhập email của bạn" required>
                </div>
                <div class="form-group" style="margin-bottom: 20px;">
                    <label class="form-label">Mật khẩu</label>
                    <input type="password" id="password" class="form-input" placeholder="Nhập mật khẩu" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; font-size: 1rem; padding: 12px;">Đăng Nhập</button>
            </form>

            <div class="divider">Hoặc</div>

            <button type="button" class="btn-google" onclick="signInWithGoogle()">
                <svg width="20" height="20" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.9c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                    <path fill="none" d="M0 0h48v48H0z"/>
                </svg>
                Tiếp tục với Google
            </button>

            <div class="auth-links">
                Chưa có tài khoản? <a href="signup.html">Đăng ký ngay</a>
            </div>
            <div class="auth-links" style="margin-top: 10px;">
                <a href="index.html" style="color: var(--text-light); font-weight: normal;">&larr; Quay lại trang chủ</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../public/js/supabase-config.js"></script>
    <script>
      const form = document.getElementById('loginForm');
      const btn = document.querySelector('button[type="submit"]');
      const msg = document.getElementById('loginError');

      function showMessage(text, type = 'info') {
        msg.textContent = text;
        msg.className = 'auth-message ' + type;
        msg.style.display = text ? 'block' : 'none';
      }

      // Nếu đã login thì vào dashboard luôn
      (async () => {
        const { data } = await window.supabaseClient.auth.getSession();
        if (data?.session) window.location.href = 'dashboard.html';
      })();

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        showMessage('');

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        btn.disabled = true;
        btn.textContent = 'Đang đăng nhập...';

        try {
          const { error } = await window.supabaseClient.auth.signInWithPassword({ email, password });
          if (error) throw error;

          showMessage('Đăng nhập thành công!', 'success');
          setTimeout(() => window.location.href = 'dashboard.html', 700);
        } catch (err) {
          showMessage(err.message || 'Đăng nhập thất bại.', 'error');
        } finally {
          btn.disabled = false;
          btn.textContent = 'Đăng Nhập';
        }
      });

      async function signInWithGoogle() {
        try {
          const { data, error } = await window.supabaseClient.auth.signInWithOAuth({
            provider: 'google',
            options: {
              redirectTo: window.location.origin + '/frontend/pages/dashboard.html'
            }
          });
          if (error) throw error;
        } catch (err) {
          showMessage(err.message || 'Đăng nhập Google thất bại.', 'error');
        }
      }
    </script>
    <script src="../public/js/global-sync.js"></script>
</body>
</html>
