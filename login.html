<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập — PeaceFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Patrick+Hand&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--cream) 0%, var(--mint-light) 100%);
            padding: 20px;
        }
        .auth-card {
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            text-align: center;
            background: var(--warm-white);
        }
        .auth-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            background: var(--mint);
            border-radius: var(--radius-sm);
            border: 2px solid var(--mint-dark);
            font-size: 1.8rem;
            box-shadow: 3px 3px 0px var(--mint-dark);
            margin-bottom: 20px;
        }
        .auth-title {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }
        .auth-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 24px;
        }
        .auth-form {
            text-align: left;
        }
        .auth-links {
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .auth-links a {
            color: var(--mint-dark);
            font-weight: 700;
        }
        #loginError {
            display: none;
            color: var(--coral-dark);
            background: var(--coral-light);
            padding: 10px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            margin-bottom: 15px;
            border: 1px solid var(--coral);
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="paper-card auth-card">
            <div class="auth-logo">🌿</div>
            <h1 class="auth-title">Chào mừng trở lại</h1>
            <p class="auth-subtitle">Tiếp tục hành trình tìm kiếm sự bình yên của bạn.</p>

            <div id="loginError"></div>

            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="Nhập email của bạn" required>
                </div>
                <div class="form-group" style="margin-bottom: 20px;">
                    <label class="form-label">Mật khẩu</label>
                    <input type="password" id="password" class="form-input" placeholder="Nhập mật khẩu" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; font-size: 1rem; padding: 12px;">Đăng Nhập</button>
            </form>

            <div class="auth-links">
                Chưa có tài khoản? <a href="signup.html">Đăng ký ngay</a>
            </div>
            <div class="auth-links" style="margin-top: 10px;">
                <a href="index.html" style="color: var(--text-light); font-weight: normal;">&larr; Quay lại trang chủ</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script>
      const form = document.getElementById('loginForm');
      const btn = document.querySelector('button[type="submit"]');
      const msg = document.getElementById('loginError');

      function showMessage(text, type = 'info') {
        msg.textContent = text;
        msg.className = 'auth-message ' + type;
        msg.style.display = text ? 'block' : 'none';
      }

      // Nếu đã login thì vào dashboard luôn
      (async () => {
        const { data } = await window.supabaseClient.auth.getSession();
        if (data?.session) window.location.href = 'dashboard.html';
      })();

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        showMessage('');

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        btn.disabled = true;
        btn.textContent = 'Đang đăng nhập...';

        try {
          const { error } = await window.supabaseClient.auth.signInWithPassword({ email, password });
          if (error) throw error;

          showMessage('Đăng nhập thành công!', 'success');
          setTimeout(() => window.location.href = 'dashboard.html', 700);
        } catch (err) {
          showMessage(err.message || 'Đăng nhập thất bại.', 'error');
        } finally {
          btn.disabled = false;
          btn.textContent = 'Đăng Nhập';
        }
      });
    </script>
</body>
</html>
